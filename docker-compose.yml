services:
  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_API_URL=/api
      - VITE_API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend

  # Backend (Laravel + Nginx + PHP-FPM 8.4)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.light
    volumes:
      - ./backend/laravel:/app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: sqlite

networks:
  default:
    name: voguerate-network
