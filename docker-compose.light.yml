services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.light
    working_dir: /app
    volumes:
      - ./backend/laravel:/app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: sqlite
